<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <!-- Background gradient matching liquid glass theme -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8e4f0"/>
      <stop offset="35%" stop-color="#dde4f4"/>
      <stop offset="65%" stop-color="#d4daf2"/>
      <stop offset="100%" stop-color="#ddd0ec"/>
    </linearGradient>
    <!-- Glass circle gradient -->
    <radialGradient id="glass" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.12)"/>
    </radialGradient>
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dy="4" result="offset"/>
      <feFlood flood-color="rgba(99,102,241,0.15)" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
    <!-- Accent gradient for play button -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  
  <!-- Subtle decorative circles (ambient glass orbs) -->
  <circle cx="200" cy="180" r="120" fill="rgba(255,255,255,0.08)" />
  <circle cx="1080" cy="540" r="150" fill="rgba(255,255,255,0.06)" />
  <circle cx="900" cy="120" r="80" fill="rgba(255,255,255,0.05)" />
  <circle cx="350" cy="580" r="100" fill="rgba(255,255,255,0.07)" />

  <!-- Main glass circle - outer glow ring -->
  <circle cx="640" cy="330" r="108" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  
  <!-- Main glass circle -->
  <circle cx="640" cy="330" r="96" fill="url(#glass)" stroke="rgba(255,255,255,0.35)" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Glass highlight arc -->
  <path d="M 570 290 A 80 80 0 0 1 710 290" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Play button triangle -->
  <polygon points="618,295 618,365 672,330" fill="white" opacity="0.9" filter="url(#glow)"/>

  <!-- Subtle "equalizer" bars below the circle -->
  <g opacity="0.3" transform="translate(640, 460)">
    <rect x="-60" y="0" width="4" height="18" rx="2" fill="url(#accent)"/>
    <rect x="-46" y="-4" width="4" height="26" rx="2" fill="url(#accent)"/>
    <rect x="-32" y="2" width="4" height="14" rx="2" fill="url(#accent)"/>
    <rect x="-18" y="-6" width="4" height="30" rx="2" fill="url(#accent)"/>
    <rect x="-4" y="-2" width="4" height="22" rx="2" fill="url(#accent)"/>
    <rect x="10" y="4" width="4" height="10" rx="2" fill="url(#accent)"/>
    <rect x="24" y="-4" width="4" height="26" rx="2" fill="url(#accent)"/>
    <rect x="38" y="0" width="4" height="18" rx="2" fill="url(#accent)"/>
    <rect x="52" y="-2" width="4" height="22" rx="2" fill="url(#accent)"/>
  </g>

  <!-- Bottom text area - subtle hint -->
  <text x="640" y="520" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="rgba(100,100,140,0.4)" letter-spacing="0.1em">▶ ODTWÓRZ WIDEO</text>

</svg>
