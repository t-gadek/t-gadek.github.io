<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="author" content="TG">
    <meta name="description" content="Calculator v1.2">

    <title>Calculator v1.2</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3e5f5; /* Jasny fioletowy */
            color: #4a148c; /* Ciemny fiolet */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .container {
            background-color: #e1bee7; /* Fioletowy */
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        h1 {
            text-align: center;
            color: #6a1b9a; /* Średni fiolet */
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-weight: bold;
            color: #4a148c; /* Ciemny fiolet */
        }

        input[type="number"], input[type="button"] {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #4a148c;
            margin-bottom: 15px;
            font-size: 16px;
            color: #4a148c;
        }

        input[type="number"] {
            background-color: #f3e5f5; /* Jasny fiolet */
        }

        input[type="button"] {
            background-color: #6a1b9a; /* Średni fiolet */
            color: white;
            cursor: pointer;
        }

        input[type="button"]:hover {
            background-color: #8e24aa; /* Intensywny fiolet */
        }

        .result {
            margin-top: 20px;
            color: #4a148c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Calculator v1.2</h1>
        <form id="add-numbers">
            <label for="number1">Digit 1:</label>
            <input type="number" id="number1" name="number1" required>

            <label for="number2">Digit 2:</label>
            <input type="number" id="number2" name="number2" required>

            <input type="button" value="Add" onclick="addNumbers()">
        </form>

        <div class="result"><span id="a"></span> <span id="sign"></span> <span id="b"></span> <span id="="></span> <span id="result"></span></div>
    </div>

    <script>
        function addNumbers() {
            const num1 = parseInt(document.getElementById("number1").value);
            const num2 = parseInt(document.getElementById("number2").value);

            document.getElementById("a").innerText = num1;
            document.getElementById("b").innerText = num2;
            document.getElementById("sign").innerText = "+";
            document.getElementById("=").innerText = "=";

            if (num1 < 0 || num2 < 0) {                
                document.getElementById("result").innerText = 0;
            } else {
                const sum = num1 + num2;
                
                document.getElementById("result").innerText = sum;
            }
        }
    </script>
</body>
</html>
